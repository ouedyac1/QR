<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.name} + ' - QR Code'">QR Code Événement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }


        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .qr-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 2rem;
            margin: 2rem 0;
            display: inline-block;
        }

        .qr-code {
            border: 8px solid white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 100%;
            height: auto;
        }

        .instructions {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 1.5rem;
            border-radius: 8px;
            margin: 2rem 0;
            text-align: left;
        }

        .instructions h3 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .instructions ol {
            color: #555;
            padding-left: 1.5rem;
        }

        .instructions li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .direct-link {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff3cd;
            border-radius: 8px;
            border: 1px solid #ffc107;
        }

        .direct-link p {
            color: #856404;
            margin-bottom: 0.5rem;
        }

        .direct-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
        }

        .direct-link a:hover {
            text-decoration: underline;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
        }

        .stat-item .number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-item .label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-download {
            background: #28a745;
            color: white;
        }

        .btn-download:hover {
            background: #218838;
        }

        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
                padding: 1rem;
            }

            .actions, .instructions, .direct-link {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .qr-container {
                padding: 1.5rem;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="event-badge">
        <img th:src="@{/img/logo.png}" alt="Logo" class="site-logo"/>
    </div>

    <h1>Scannez pour participer</h1>
    <p class="subtitle">QR Code pour poser vos questions</p>

    <div class="qr-container">
        <img th:src="@{/questions/qrcode/{slug}(slug=${event.slug})}"
             th:alt="'QR Code ' + ${event.name}"
             class="qr-code"
             id="qrCodeImage" />
        <p>Propulsé par la DCSIC</p>
    </div>


    <!--div class="actions">
        <a th:href="@{/qrcode/{slug}(slug=${event.slug})}"
           download
           class="btn btn-download">
            📥 Télécharger QR Code
        </a>
        <button onclick="window.print()" class="btn btn-secondary">
            🖨️ Imprimer
        </button>
        <a href="/" class="btn btn-primary">
            🏠 Tous les événements
        </a>
    </div-->
</div>
</body>
</html>
