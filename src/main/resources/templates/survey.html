<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${event.name}">Questionnaire</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #007bff 0%, #6610f2 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .card {
            background: #fff;
            border: none;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
        }

        .card-title {
            color: #343a40;
            font-weight: 600;
        }

        .btn-theme {
            background: linear-gradient(90deg, #007bff, #6610f2);
            border: none;
            color: white;
            transition: 0.3s;
        }

        .btn-theme:hover {
            opacity: 0.9;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-weight: 700;
            font-size: 2.5rem;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #e0e0e0;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="container">
    <header>
        <h1 th:text="'📝 ' + ${event.name}">Nom de l'évènement</h1>
        <p class="lead">Choisissez un thème pour commencer votre questionnaire</p>
    </header>

    <div class="row justify-content-center g-4" th:if="${themes}">
        <div class="col-md-4 col-sm-6" th:each="theme : ${themes}">
            <div class="card text-center p-4">
                <div class="card-body">
                    <h5 class="card-title" th:text="${theme.title}">Titre du thème</h5>
                    <p class="card-text text-muted">Répondez au questionnaire associé à ce thème.</p>
                    <a class="btn btn-theme"
                       th:href="@{|/survey/theme/${theme.id}|}">
                        Commencer
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(themes)}" class="text-center">
        <p class="fs-5">Aucun thème disponible pour cet évènement.</p>
    </div>
</div>

<footer>
    © <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> — Plateforme de sondage DCSIC
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
